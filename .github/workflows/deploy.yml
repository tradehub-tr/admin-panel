name: Deploy Admin Panel

on:
  push:
    branches: [ master, ahmet, ali, bora ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── 1. Sunucuya deploy (sadece master) ────────────────
  deploy-server:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 152.53.147.222
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 5055
          script: |
            cd /opt/tradehub/admin-panel
            git pull origin master
            cd /opt/tradehub
            docker compose build --no-cache admin-panel
            docker compose up -d --force-recreate admin-panel
            echo "✅ Admin panel deploy tamamlandı"

  # ── 2. GitHub Pages deploy (ahmet, ali, bora) ──────────
  deploy-pages:
    if: github.ref != 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build for GitHub Pages
        working-directory: frontend
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_API_BASE: https://rc.istoc.com
          VITE_FRAPPE_BACKEND: https://rc.istoc.com
          VITE_FRAPPE_SOCKETIO: https://rc.istoc.com
          VITE_STOREFRONT_URL: https://preview.istoc.com

      - name: Copy index.html to 404.html for SPA routing
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
