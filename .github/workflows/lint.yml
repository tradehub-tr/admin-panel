name: Lint & Auto-fix

on:
  push:
    branches: [master, ahmet, ali, bora]
  pull_request:
    branches: [master]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Paralel run race condition'ından kaçınmak için origin'e reset + lint'i
      # yeniden çalıştır. Origin zaten fixes içeriyorsa lint:fix no-op olur,
      # auto-commit "no changes" görüp temiz çıkar.
      - name: Sync with origin
        working-directory: ${{ github.workspace }}
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"

      - name: Run ESLint auto-fix
        run: npm run lint:fix
        continue-on-error: true

      - name: Commit auto-fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix lint [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          file_pattern: "frontend/src/**/*.js frontend/src/**/*.vue frontend/src/**/*.scss"

      - name: Fail if lint errors remain
        run: npm run lint
