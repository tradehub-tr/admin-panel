<!DOCTYPE html>
<html lang="tr" class="h-full">

<head>
  <!-- Pre-render theme to prevent flash of wrong theme -->
  <script>
    (function () {
      var stored = localStorage.getItem('th-theme');
      var valid = (stored === 'light' || stored === 'dark') ? stored : null;
      var theme = valid || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (!valid) localStorage.setItem('th-theme', theme);
      if (theme === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iStoc B2B - Satıcı Paneli</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <!-- Tailwind ve Font Awesome artık Vite build'ine derleniyor (src/assets/tailwind.css +
       @fortawesome/fontawesome-free, main.js'te import). CSP altında dış CDN'e gerek yok. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
</head>

<body class="h-full font-sans antialiased">
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
